```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Manajemen Sparepart Teknisi</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f7;
margin:0;
padding:30px;
}

.card{
background:white;
width:210mm;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:15px;
}

input[type=file]{
border:1px solid #ccc;
padding:5px;
border-radius:5px;
background:white;
}

button{
border:none;
padding:6px 12px;
border-radius:6px;
font-size:12px;
cursor:pointer;
color:white;
}

.btn-add{background:#3498db;}
.btn-delete{background:#e74c3c;}
.btn-reset{background:#9b59b6;}
.btn-excel{background:#27ae60;}
.btn-pdf{background:#e67e22;}

button:hover{
opacity:0.85;
}

.table-box{
overflow-x:auto;
border:1px solid #ddd;
border-radius:6px;
}

table{
border-collapse:collapse;
font-size:9px;
white-space:nowrap;
width:100%;
}

th{
background:#34495e;
color:white;
padding:6px;
border:1px solid #ddd;
}

td{
border:1px solid #ddd;
padding:4px;
}

tr:hover{
background:#f2f6ff;
}

.selected{
background:#ffe5e5 !important;
}

td:focus{
outline:2px solid #3498db;
}

</style>
</head>

<body>

<div class="card">

<h2>Manajemen Sparepart Teknisi</h2>

<div class="controls">

<input type="file" id="upload" accept=".xlsx,.xls,.csv">

<button class="btn-add" onclick="addRow()">Tambah</button>
<button class="btn-delete" onclick="deleteRow()">Hapus</button>
<button class="btn-reset" onclick="resetTable()">Reset</button>
<button class="btn-excel" onclick="downloadExcel()">Download Excel</button>
<button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>

</div>

<div class="table-box">

<table id="dataTable">

<thead>
<tr>
<th>No</th>
<th>Catatan</th>
<th>Part</th>
<th>Qty</th>
<th>Part Demand</th>
<th>Serial Number</th>
<th>Teknisi Perbaikan</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let tableData=[];
let selectedRow=null;

document.getElementById('upload').addEventListener('change',function(e){

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result);
const workbook=XLSX.read(data,{type:'array'});

const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

tableData=json;

displayData();

};

reader.readAsArrayBuffer(file);

});


function displayData(){

const tbody=document.querySelector("#dataTable tbody");

tbody.innerHTML="";

tableData.forEach((row,i)=>{

let tr=document.createElement("tr");

tr.onclick=function(){
document.querySelectorAll("#dataTable tbody tr").forEach(r=>r.classList.remove("selected"));
tr.classList.add("selected");
selectedRow=i;
};

tr.innerHTML=`

<td contenteditable="true">${row["No"] ?? i+1}</td>
<td contenteditable="true">${row["Catatan"] ?? ""}</td>
<td contenteditable="true">${row["Part"] ?? ""}</td>
<td contenteditable="true">${row["Qty"] ?? ""}</td>
<td contenteditable="true">${row["Part Demand"] ?? ""}</td>
<td contenteditable="true">${row["Serial Number"] ?? ""}</td>
<td contenteditable="true">${row["Teknisi Perbaikan"] ?? ""}</td>

`;

tbody.appendChild(tr);

});

}


function addRow(){

tableData.push({
"No":"",
"Catatan":"",
"Part":"",
"Qty":"",
"Part Demand":"",
"Serial Number":"",
"Teknisi Perbaikan":""
});

displayData();

}


function deleteRow(){

if(selectedRow==null){
alert("Pilih baris dulu");
return;
}

tableData.splice(selectedRow,1);
selectedRow=null;

displayData();

}


function resetTable(){

if(confirm("Hapus semua data?")){
tableData=[];
displayData();
}

}


function readTable(){

let rows=document.querySelectorAll("#dataTable tbody tr");

tableData=[];

rows.forEach(r=>{

let c=r.children;

tableData.push({

"No":c[0].innerText,
"Catatan":c[1].innerText,
"Part":c[2].innerText,
"Qty":c[3].innerText,
"Part Demand":c[4].innerText,
"Serial Number":c[5].innerText,
"Teknisi Perbaikan":c[6].innerText

});

});

}


function downloadExcel(){

readTable();

let ws=XLSX.utils.json_to_sheet(tableData);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Data");

XLSX.writeFile(wb,"data_sparepart.xlsx");

}


function downloadPDF(){

readTable();

const { jsPDF }=window.jspdf;

let doc=new jsPDF({
orientation:'portrait',
unit:'mm',
format:'a4'
});

doc.text("Data Sparepart Teknisi",14,10);

let rows=[];

tableData.forEach(r=>{

rows.push([
r["No"],
r["Catatan"],
r["Part"],
r["Qty"],
r["Part Demand"],
r["Serial Number"],
r["Teknisi Perbaikan"]
]);

});

doc.autoTable({

head:[[
"No",
"Catatan",
"Part",
"Qty",
"Part Demand",
"Serial Number",
"Teknisi Perbaikan"
]],

body:rows,

startY:15,

styles:{fontSize:7},

theme:'grid'

});

doc.save("data_sparepart.pdf");

}

</script>

</body>
</html>
