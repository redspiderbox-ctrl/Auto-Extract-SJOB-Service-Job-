<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WiFi File Share (Multi File)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #020617;
  color: #e5e7eb;
  text-align: center;
  padding: 20px;
}
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  max-width: 420px;
  margin: auto;
}
button {
  background: #22c55e;
  border: none;
  padding: 10px 16px;
  margin: 5px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}
input {
  width: 95%;
  padding: 8px;
  margin: 5px 0;
}
progress {
  width: 100%;
}
</style>
</head>

<body>

<h2>📶 WiFi File Share</h2>
<p>Kirim banyak file sekaligus (P2P)</p>

<div class="card">
  <input id="room" placeholder="Room ID">
  <br>
  <button onclick="createRoom()">Buat Room</button>
  <button onclick="joinRoom()">Gabung</button>

  <hr>

  <input type="file" id="files" multiple>
  <br><br>
  <button onclick="sendFiles()">Kirim Semua File</button>
  <progress id="progress" value="0" max="100"></progress>
</div>

<script>
let pc, channel;
let incoming = {};
const CHUNK_SIZE = 16000;

const servers = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function createRoom() {
  const id = Math.random().toString(36).substring(2, 8);
  room.value = id;
  alert("Room ID: " + id);
  init(true);
}

function joinRoom() {
  if (!room.value) return alert("Masukkan Room ID");
  init(false);
}

function init(host) {
  pc = new RTCPeerConnection(servers);

  if (host) {
    channel = pc.createDataChannel("data");
    setupChannel();
  } else {
    pc.ondatachannel = e => {
      channel = e.channel;
      setupChannel();
    };
  }

  pc.onicecandidate = e => {
    if (e.candidate)
      localStorage.setItem("ice-" + room.value, JSON.stringify(e.candidate));
  };

  const offerKey = "offer-" + room.value;
  const answerKey = "answer-" + room.value;

  if (host) {
    pc.createOffer().then(o => {
      pc.setLocalDescription(o);
      localStorage.setItem(offerKey, JSON.stringify(o));
    });
  } else {
    const offer = JSON.parse(localStorage.getItem(offerKey));
    pc.setRemoteDescription(offer);
    pc.createAnswer().then(a => {
      pc.setLocalDescription(a);
      localStorage.setItem(answerKey, JSON.stringify(a));
    });
  }

  setInterval(() => {
    const ice = localStorage.getItem("ice-" + room.value);
    if (ice) pc.addIceCandidate(JSON.parse(ice));

    const answer = localStorage.getItem(answerKey);
    if (answer && !pc.currentRemoteDescription)
      pc.setRemoteDescription(JSON.parse(answer));
  }, 800);
}

function setupChannel() {
  channel.binaryType = "arraybuffer";

  channel.onmessage = e => {
    if (typeof e.data === "string") {
      const msg = JSON.parse(e.data);
      if (msg.type === "meta") {
        incoming[msg.name] = { size: msg.size, chunks: [] };
      }
      if (msg.type === "end") {
        const data = incoming[msg.name].chunks;
        const blob = new Blob(data);
        download(blob, msg.name);
        delete incoming[msg.name];
      }
      return;
    }

    Object.values(incoming)[0].chunks.push(e.data);
  };
}

function sendFiles() {
  const fileList = files.files;
  if (!fileList.length || !channel) return alert("File / koneksi belum siap");

  let sent = 0;
  const total = fileList.length;

  [...fileList].reduce((p, file) => {
    return p.then(() => sendFile(file).then(() => {
      sent++;
      progress.value = (sent / total) * 100;
    }));
  }, Promise.resolve());
}

function sendFile(file) {
  return new Promise(resolve => {
    channel.send(JSON.stringify({
      type: "meta",
      name: file.name,
      size: file.size
    }));

    const reader = new FileReader();
    let offset = 0;

    reader.onload = e => {
      channel.send(e.target.result);
      offset += e.target.result.byteLength;
      if (offset < file.size) readSlice(offset);
      else {
        channel.send(JSON.stringify({ type: "end", name: file.name }));
        resolve();
      }
    };

    function readSlice(o) {
      reader.readAsArrayBuffer(file.slice(o, o + CHUNK_SIZE));
    }
    readSlice(0);
  });
}

function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}
</script>

</body>
</html>
